version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: avalon-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: avalon_game
    volumes:
      - mongodb_data:/data/db
    networks:
      - avalon-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: avalon-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: ${MONGO_URL}
      DB_NAME: ${DB_NAME}
    depends_on:
      - mongodb
    networks:
      - avalon-network
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: avalon-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    depends_on:
      - backend
    networks:
      - avalon-network
    volumes:
      - ./frontend:/app/frontend

  cloudflared:
    image: cloudflare/cloudflared:2024.6.0
    container_name: avalon-cloudflared
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - avalon-network

volumes:
  mongodb_data:

networks:
  avalon-network:
    driver: bridge