services:
  mongodb:
    image: mongo:7.0
    container_name: avalon-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-avalon_game}
    volumes:
      - mongodb_data:/data/db
    networks:
      - avalon-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: avalon-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:changeme@mongodb:27017/avalon_game?authSource=admin}
      - DB_NAME=${DB_NAME:-avalon_game}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - avalon-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: avalon-frontend
    restart: unless-stopped
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-backend}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - avalon-network

  # Optional: Cloudflare Tunnel for external access
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: avalon-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    profiles:
      - tunnel
    networks:
      - avalon-network

volumes:
  mongodb_data:

networks:
  avalon-network:
    driver: bridge
