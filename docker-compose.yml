version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: avalon-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-avalon123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-avalon_game}
    volumes:
      - mongodb_data:/data/db
    # MongoDB is only accessed by the backend service — no host port exposure
    networks:
      - avalon-network

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: avalon-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:avalon123@mongodb:27017/avalon_game?authSource=admin}
      - DB_NAME=${DB_NAME:-avalon_game}
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
    networks:
      - avalon-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: avalon-frontend
    restart: unless-stopped
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-backend}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - avalon-network

  # Optional: Cloudflare Tunnel for external access
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: avalon-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    profiles:
      - tunnel
    networks:
      - avalon-network

volumes:
  mongodb_data:

networks:
  avalon-network:
    driver: bridge